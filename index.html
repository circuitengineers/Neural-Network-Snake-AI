<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neural Network Snake AI</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e0e0f0; font-family:monospace; display:flex; height:100vh; overflow:hidden; }
#left { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; flex:1; }
#right { width:280px; padding:20px; background:#14141f; border-left:1px solid #2a2a3f; overflow-y:auto; font-size:12px; }
canvas { border:2px solid #2a2a3f; border-radius:4px; }
h2 { color:#00e5ff; margin-bottom:12px; font-size:14px; }
h3 { color:#9b59ff; margin-bottom:8px; font-size:12px; }
.stat { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #1a1a28; }
.label { color:#7070a0; }
.val { color:#fff; }
.best { color:#ffd166; }
.btn { background:#1a1a28; border:1px solid #2a2a3f; color:#e0e0f0; padding:6px 12px; border-radius:4px; cursor:pointer; margin:3px; font-family:monospace; font-size:11px; }
.btn:hover { background:#2a2a3f; }
.btn.active { background:#9b59ff; border-color:#9b59ff; }
#network { margin-top:12px; }
#speedSlider { width:100%; margin:8px 0; }
.gene-bar { height:4px; margin:1px 0; border-radius:2px; }
</style>
</head>
<body>
<div id="left">
  <h2 style="font-size:18px; margin-bottom:16px;">🐍 Neural Network Snake AI</h2>
  <canvas id="c" width="400" height="400"></canvas>
  <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
    <button class="btn" onclick="togglePause()">⏸ Pause</button>
    <button class="btn" onclick="restart()">↺ Restart</button>
    <button class="btn active" id="aiBtn" onclick="toggleAI()">🧠 AI On</button>
    <input type="range" id="speedSlider" min="1" max="20" value="8" style="width:150px">
    <span style="font-size:11px;color:#7070a0">Speed: <span id="speedVal">8</span>x</span>
  </div>
</div>
<div id="right">
  <h2>📊 Stats</h2>
  <div class="stat"><span class="label">Generation</span><span class="val" id="gen">1</span></div>
  <div class="stat"><span class="label">Score</span><span class="val" id="score">0</span></div>
  <div class="stat"><span class="label">Best Score</span><span class="best" id="best">0</span></div>
  <div class="stat"><span class="label">Steps</span><span class="val" id="steps">0</span></div>
  <div class="stat"><span class="label">Moves Left</span><span class="val" id="moves">0</span></div>
  <div class="stat"><span class="label">Fitness</span><span class="val" id="fitness">0</span></div>

  <h3 style="margin-top:16px;">🧠 Neural Network</h3>
  <canvas id="network" width="240" height="200"></canvas>

  <h3 style="margin-top:12px;">👁️ Inputs (24)</h3>
  <div id="inputs" style="display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:10px;"></div>

  <h3 style="margin-top:12px;">📜 Log</h3>
  <div id="log" style="font-size:10px;color:#7070a0;max-height:150px;overflow-y:auto;"></div>
</div>

<script>
const GRID = 20;
const CELL = 400 / GRID;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const netCanvas = document.getElementById('network');
const netCtx = netCanvas.getContext('2d');

// Neural Network
class NeuralNet {
  constructor(weights) {
    this.inputSize = 24;
    this.hiddenSize = 16;
    this.outputSize = 4;
    if (weights) {
      this.w1 = weights.w1;
      this.b1 = weights.b1;
      this.w2 = weights.w2;
      this.b2 = weights.b2;
    } else {
      this.w1 = Array.from({length:this.hiddenSize}, () => Array.from({length:this.inputSize}, () => (Math.random()-0.5)*2));
      this.b1 = Array.from({length:this.hiddenSize}, () => (Math.random()-0.5)*2);
      this.w2 = Array.from({length:this.outputSize}, () => Array.from({length:this.hiddenSize}, () => (Math.random()-0.5)*2));
      this.b2 = Array.from({length:this.outputSize}, () => (Math.random()-0.5)*2);
    }
  }

  relu(x) { return Math.max(0, x); }

  forward(inputs) {
    const h = this.w1.map((row, i) => this.relu(row.reduce((s, w, j) => s + w * inputs[j], 0) + this.b1[i]));
    const o = this.w2.map((row, i) => row.reduce((s, w, j) => s + w * h[j], 0) + this.b2[i]);
    return o;
  }

  mutate(rate) {
    const clone = new NeuralNet({ w1: JSON.parse(JSON.stringify(this.w1)), b1:[...this.b1], w2:JSON.parse(JSON.stringify(this.w2)), b2:[...this.b2] });
    clone.w1.forEach(row => row.forEach((_, j) => { if (Math.random() < rate) row[j] += (Math.random()-0.5)*0.5; }));
    clone.b1.forEach((_, i) => { if (Math.random() < rate) clone.b1[i] += (Math.random()-0.5)*0.5; });
    clone.w2.forEach(row => row.forEach((_, j) => { if (Math.random() < rate) row[j] += (Math.random()-0.5)*0.5; }));
    clone.b2.forEach((_, i) => { if (Math.random() < rate) clone.b2[i] += (Math.random()-0.5)*0.5; });
    return clone;
  }
}

// Snake Game
class Snake {
  constructor(brain) {
    this.brain = brain || new NeuralNet();
    this.reset();
  }

  reset() {
    this.body = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    this.dir = {x:1,y:0};
    this.food = this.randomFood();
    this.score = 0;
    this.steps = 0;
    this.movesLeft = 200;
    this.alive = true;
    this.fitness = 0;
  }

  randomFood() {
    let f;
    do { f = {x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID)}; }
    while (this.body.some(b => b.x===f.x && b.y===f.y));
    return f;
  }

  getInputs() {
    const dirs = [{x:0,y:-1},{x:1,y:-1},{x:1,y:0},{x:1,y:1},{x:0,y:1},{x:-1,y:1},{x:-1,y:0},{x:-1,y:-1}];
    const inputs = [];
    for (const d of dirs) {
      let dist = 0, foodFound = 0, bodyFound = 0;
      let cx = this.body[0].x + d.x, cy = this.body[0].y + d.y;
      while (cx>=0&&cx<GRID&&cy>=0&&cy<GRID) {
        dist++;
        if (cx===this.food.x&&cy===this.food.y) foodFound = 1;
        if (this.body.some(b=>b.x===cx&&b.y===cy)) { bodyFound = 1; break; }
        cx+=d.x; cy+=d.y;
      }
      inputs.push(dist===0?1:1/dist, foodFound, bodyFound);
    }
    return inputs;
  }

  step() {
    if (!this.alive) return;
    this.movesLeft--;
    this.steps++;

    if (aiMode) {
      const inputs = this.getInputs();
      const out = this.brain.forward(inputs);
      const maxIdx = out.indexOf(Math.max(...out));
      const dirs = [{x:0,y:-1},{x:1,y:0},{x:0,y:1},{x:-1,y:0}];
      const newDir = dirs[maxIdx];
      if (newDir.x !== -this.dir.x || newDir.y !== -this.dir.y) this.dir = newDir;
    }

    const head = {x: this.body[0].x + this.dir.x, y: this.body[0].y + this.dir.y};
    if (head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||this.body.some(b=>b.x===head.x&&b.y===head.y)||this.movesLeft<=0) {
      this.alive = false;
      this.fitness = this.steps + (2**this.score + 500*this.score**2.1) - (0.25*this.steps**1.3)*this.score**1.2;
      return;
    }
    this.body.unshift(head);
    if (head.x===this.food.x&&head.y===this.food.y) {
      this.score++;
      this.movesLeft = Math.min(this.movesLeft + 150, 500);
      this.food = this.randomFood();
    } else { this.body.pop(); }
  }
}

let snake = new Snake();
let generation = 1;
let bestScore = 0;
let bestBrain = null;
let paused = false;
let aiMode = true;
let population = Array.from({length:50}, () => new Snake());
let popIndex = 0;
let speed = 8;
let logLines = [];

document.getElementById('speedSlider').oninput = e => {
  speed = +e.target.value;
  document.getElementById('speedVal').textContent = speed;
};

function togglePause() { paused = !paused; }
function toggleAI() {
  aiMode = !aiMode;
  document.getElementById('aiBtn').className = 'btn' + (aiMode ? ' active' : '');
  document.getElementById('aiBtn').textContent = aiMode ? '🧠 AI On' : '🎮 Manual';
}

function restart() {
  generation = 1;
  bestScore = 0;
  bestBrain = null;
  population = Array.from({length:50}, () => new Snake());
  popIndex = 0;
  snake = population[0];
  logLines = [];
}

function nextGeneration() {
  population.sort((a,b) => b.fitness - a.fitness);
  const best = population[0];
  if (best.score > bestScore) {
    bestScore = best.score;
    bestBrain = best.brain;
    addLog(`Gen ${generation}: New best! Score=${bestScore}`);
  }
  generation++;
  const newPop = [];
  newPop.push(new Snake(best.brain));
  newPop.push(new Snake(population[1].brain));
  for (let i = 2; i < 50; i++) {
    const parent = population[Math.floor(Math.random()*10)];
    newPop.push(new Snake(parent.brain.mutate(0.1)));
  }
  population = newPop;
  popIndex = 0;
  snake = population[0];
}

function addLog(msg) {
  logLines.unshift(msg);
  if (logLines.length > 20) logLines.pop();
  document.getElementById('log').innerHTML = logLines.map(l => `<div>${l}</div>`).join('');
}

function drawNetwork() {
  const nc = netCanvas;
  const nx = netCtx;
  nx.clearRect(0, 0, nc.width, nc.height);
  const layers = [8, 16, 4];
  const xs = [30, 120, 210];
  const positions = [];

  layers.forEach((count, li) => {
    const pos = [];
    for (let i = 0; i < Math.min(count, 8); i++) {
      pos.push({ x: xs[li], y: 20 + i * (160/Math.min(count,8)) });
    }
    positions.push(pos);
  });

  // Draw connections
  const inputs = snake.alive ? snake.getInputs() : [];
  const out = snake.alive ? snake.brain.forward(inputs) : [0,0,0,0];
  for (let i = 0; i < positions[0].length; i++) {
    for (let j = 0; j < positions[1].length; j++) {
      const w = snake.brain.w1[j][i*3] || 0;
      nx.strokeStyle = w > 0 ? `rgba(0,229,255,${Math.min(Math.abs(w)*0.3,0.4)})` : `rgba(255,63,63,${Math.min(Math.abs(w)*0.3,0.4)})`;
      nx.lineWidth = 0.5;
      nx.beginPath();
      nx.moveTo(positions[0][i].x, positions[0][i].y);
      nx.lineTo(positions[1][j].x, positions[1][j].y);
      nx.stroke();
    }
  }

  // Draw nodes
  positions.forEach((layer, li) => {
    layer.forEach((node, ni) => {
      nx.beginPath();
      nx.arc(node.x, node.y, 5, 0, Math.PI*2);
      nx.fillStyle = li===0?'#00e5ff':li===1?'#9b59ff':'#ffd166';
      nx.fill();
    });
  });

  // Output labels
  const labels = ['↑','→','↓','←'];
  const maxOut = Math.max(...out);
  positions[2].forEach((node, i) => {
    nx.fillStyle = out[i] === maxOut ? '#fff' : '#7070a0';
    nx.font = '11px monospace';
    nx.fillText(labels[i], node.x + 8, node.y + 4);
  });
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, 400, 400);

  // Grid
  ctx.strokeStyle = '#1a1a28';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,400); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(400,i*CELL); ctx.stroke();
  }

  // Food
  const pulse = 0.5 + 0.5*Math.sin(Date.now()*0.005);
  ctx.fillStyle = `rgba(255,63,63,${0.7+pulse*0.3})`;
  ctx.beginPath();
  ctx.arc(snake.food.x*CELL+CELL/2, snake.food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `${CELL*0.6}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🍎', snake.food.x*CELL+CELL/2, snake.food.y*CELL+CELL*0.75);

  // Snake body
  snake.body.forEach((seg, i) => {
    const t = i / snake.body.length;
    ctx.fillStyle = i===0 ? '#00e5ff' : `hsl(${160+t*40},80%,${50-t*20}%)`;
    ctx.fillRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2);
    if (i===0) {
      ctx.fillStyle = '#000';
      ctx.fillRect(seg.x*CELL+3, seg.y*CELL+3, 3, 3);
      ctx.fillRect(seg.x*CELL+CELL-6, seg.y*CELL+3, 3, 3);
    }
  });

  if (!snake.alive) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, 400, 400);
    ctx.fillStyle = '#ff3f3f';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', 200, 190);
    ctx.fillStyle = '#e0e0f0';
    ctx.font = '14px monospace';
    ctx.fillText(`Score: ${snake.score}`, 200, 215);
  }
}

function updateUI() {
  document.getElementById('gen').textContent = generation;
  document.getElementById('score').textContent = snake.score;
  document.getElementById('best').textContent = bestScore;
  document.getElementById('steps').textContent = snake.steps;
  document.getElementById('moves').textContent = snake.movesLeft;
  document.getElementById('fitness').textContent = snake.fitness.toFixed(0);
}

document.addEventListener('keydown', e => {
  if (!aiMode) {
    if (e.key==='ArrowUp'&&snake.dir.y!==1) snake.dir={x:0,y:-1};
    if (e.key==='ArrowRight'&&snake.dir.x!==-1) snake.dir={x:1,y:0};
    if (e.key==='ArrowDown'&&snake.dir.y!==-1) snake.dir={x:0,y:1};
    if (e.key==='ArrowLeft'&&snake.dir.x!==1) snake.dir={x:-1,y:0};
  }
});

let frameCount = 0;
function loop() {
  requestAnimationFrame(loop);
  if (paused) { draw(); return; }

  frameCount++;
  if (frameCount % Math.max(1, Math.round(10/speed)) !== 0) return;

  for (let i = 0; i < speed; i++) {
    if (!snake.alive) {
      if (aiMode) {
        popIndex++;
        if (popIndex >= population.length) nextGeneration();
        else snake = population[popIndex];
      } else {
        snake.reset();
      }
    } else {
      snake.step();
    }
  }

  draw();
  drawNetwork();
  updateUI();
}

loop();
</script>
</body>
</html>
